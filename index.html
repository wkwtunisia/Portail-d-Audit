<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKW Automotive | Master Audit Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --wkw-red: #c0392b;
            --wkw-red-light: #e74c3c;
            --wkw-dark: #0f172a;
            --bg-color: #f1f5f9;
            --success: #10b981;
            --warning: #f59e0b;
            --text-dark: #1e293b;
            --sidebar-width: 280px;
            --sidebar-collapsed: 80px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); display: flex; min-height: 100vh; overflow-x: hidden; color: var(--text-dark); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        .animate-fade-up { animation: fadeUp 0.6s ease-out forwards; }
        #toast { position: fixed; bottom: -100px; right: 20px; background: white; color: var(--text-dark); padding: 15px 25px; border-radius: 12px; border-left: 5px solid var(--wkw-red); box-shadow: 0 10px 40px rgba(0,0,0,0.1); font-weight: 600; z-index: 10000; display: flex; align-items: center; gap: 15px; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        #toast.show { bottom: 30px; }
        #toast i { font-size: 1.5rem; color: var(--wkw-red); }
        #loginOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        .login-card { background: white; padding: 50px; border-radius: 24px; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); animation: popIn 0.6s ease-out; }
        .login-card input { width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: var(--transition); font-size: 15px; background: #f8fafc; }
        .login-card input:focus { border-color: var(--wkw-red); background: white; box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.1); }
        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--wkw-red), var(--wkw-red-light)); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; letter-spacing: 1px; cursor: pointer; margin-top: 20px; transition: var(--transition); text-transform: uppercase; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(192, 57, 43, 0.3); }
        .forgot-link { color: var(--wkw-red); font-size: 0.92rem; display: block; margin: 12px 0 8px; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }
        .sidebar { width: var(--sidebar-width); background: var(--wkw-dark); height: 100vh; position: fixed; left: 0; top: 0; transition: var(--transition); z-index: 2000; display: flex; flex-direction: column; box-shadow: 4px 0 25px rgba(0,0,0,0.1); }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar-header { background: white; height: 90px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid var(--wkw-red); transition: var(--transition); overflow: hidden; }
        .sidebar-header img { width: 160px; transition: var(--transition); }
        .sidebar.collapsed .sidebar-header img { width: 0; opacity: 0; }
        .nav-links { flex: 1; padding: 30px 15px; }
        .nav-item { display: flex; align-items: center; padding: 16px 20px; color: #94a3b8; text-decoration: none; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: var(--transition); position: relative; }
        .nav-item i { min-width: 40px; font-size: 1.4rem; text-align: center; z-index: 2; }
        .nav-item span { opacity: 1; transition: var(--transition); font-weight: 600; font-size: 15px; z-index: 2; white-space: nowrap; }
        .sidebar.collapsed .nav-item span { opacity: 0; width: 0; visibility: hidden; }
        .nav-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: var(--wkw-red); border-radius: 12px; transition: var(--transition); z-index: 1; }
        .nav-item:hover::before, .nav-item.active::before { width: 100%; }
        .nav-item:hover, .nav-item.active { color: white; transform: translateX(5px); }
        .main-wrapper { flex: 1; margin-left: var(--sidebar-width); padding: 40px; transition: var(--transition); }
        .main-wrapper.expanded { margin-left: var(--sidebar-collapsed); }
        .top-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 20px 30px; border-radius: 20px; margin-bottom: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.5); }
        .menu-btn { background: white; color: var(--wkw-dark); border: 1px solid #e2e8f0; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; transition: var(--transition); }
        .menu-btn:hover { background: #f8fafc; transform: scale(1.05); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 30px; border-radius: 24px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); transition: var(--transition); }
        .stat-card:hover { transform: translateY(-8px); }
        .stat-icon { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        .ok-card .stat-icon { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .nok-card .stat-icon { background: rgba(231, 76, 60, 0.1); color: var(--wkw-red); }
        .stat-card h3 { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-card .value { font-size: 2.8rem; font-weight: 800; line-height: 1; color: var(--text-dark); }
        .glass-panel { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(255,255,255,0.8); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.3s; background: #f8fafc; }
        .input-group input:focus, .input-group select:focus { border-color: var(--wkw-red); background: white; box-shadow: 0 0 0 4px rgba(192, 57, 43, 0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 15px 20px; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        tbody tr { background: #f8fafc; transition: var(--transition); border-radius: 12px; }
        tbody tr:hover { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transform: scale(1.01); }
        td { padding: 18px 20px; font-size: 15px; font-weight: 500; }
        td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; color: var(--wkw-red); font-weight: 800; }
        td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        .custom-radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-btn input[type="radio"] { display: none; }
        .radio-btn label { display: inline-block; padding: 10px 20px; background: #e2e8f0; color: #64748b; border-radius: 30px; font-size: 13px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .radio-btn input[type="radio"]:checked + label.ok-label { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .radio-btn input[type="radio"]:checked + label.nok-label { background: var(--wkw-red); color: white; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3); }
        .radio-btn input[type="radio"]:checked + label.na-label { background: var(--text-dark); color: white; box-shadow: 0 4px 12px rgba(30, 41, 59, 0.3); }
        .export-btn { background: rgba(16,185,129,0.1); color: var(--success); border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .export-btn:hover { background: rgba(16,185,129,0.2); transform: translateY(-2px); }
        .chart-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .no-data { text-align: center; padding: 80px 20px; color: #64748b; font-size: 18px; }
        .global-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeUp 0.5s ease forwards; }
    </style>
</head>
<body>

    <div id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toastMsg">Message</span></div>

    <div id="loginOverlay">
        <div class="login-card">
            <img src="https://3dologie.com/wp-content/uploads/2024/07/WKW-Automotive-Logo.png" width="220" style="margin-bottom: 30px;">
            <h2 style="margin-bottom: 24px; font-weight: 800; color: var(--text-dark);">Portail d'Audit</h2>
            <input type="email" id="user" placeholder="Email (ex: audit@wkw.fr)" autocomplete="email">
            <input type="password" id="pass" placeholder="Mot de passe" autocomplete="current-password">
            <a href="#" class="forgot-link" onclick="resetPassword()">Mot de passe oublié ?</a>
            <button class="btn-primary" onclick="handleLogin()">Connexion Sécurisée</button>
        </div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><img src="https://3dologie.com/wp-content/uploads/2024/07/WKW-Automotive-Logo.png"></div>
        <div class="nav-links">
            <div class="nav-item active" onclick="switchPage('auditPage')"><i class="fa-solid fa-layer-group"></i><span>Nouvel Audit</span></div>
            <div class="nav-item" onclick="switchPage('historyPage')"><i class="fa-solid fa-chart-line"></i><span>Base de Données</span></div>
            <div class="nav-item" onclick="switchPage('chartPage')"><i class="fa-solid fa-chart-bar"></i><span>Graphiques</span></div>
            <div class="nav-item" style="margin-top: auto;" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Déconnexion</span></div>
        </div>
    </nav>

    <div class="main-wrapper" id="mainWrapper">
        <div class="top-bar animate-fade-up">
            <div style="display:flex; align-items:center; gap:20px;">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
                <h2 id="pageTitle" style="font-weight: 800;">Audit en Temps Réel</h2>
            </div>
            <div style="font-weight: 700; color: #64748b; display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-shield-halved" style="color:var(--success)"></i> Système Actif
            </div>
        </div>

        <!-- Audit Page -->
        <div id="auditPage" class="page-section active">
            <div class="stats-grid animate-fade-up delay-1">
                <div class="stat-card ok-card"><div class="stat-icon"><i class="fa-solid fa-check"></i></div><div><h3>Points OK</h3><div class="value" id="count-ok" style="color:var(--success)">0</div></div></div>
                <div class="stat-card nok-card"><div class="stat-icon"><i class="fa-solid fa-xmark"></i></div><div><h3>Points NOK</h3><div class="value" id="count-nok" style="color:var(--wkw-red)">0</div></div></div>
                <div class="stat-card score-card"><div class="stat-icon"><i class="fa-solid fa-bolt"></i></div><div><h3>Performance</h3><div class="value" id="count-score">0%</div></div></div>
            </div>
            <div class="glass-panel animate-fade-up delay-2">
                <div class="form-row">
                    <div class="input-group"><label>Date de l'inspection</label><input type="date" id="auditDate"></div>
                    <div class="input-group"><label>Secteur (UAP)</label><select id="uapSelect"><option value="UAP 1">UAP 1</option><option value="UAP 2">UAP 2</option></select></div>
                    <div class="input-group"><label>Numéro de Ligne</label><input type="text" id="ligneInput" placeholder="Ex: Ligne 04"></div>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>N°</th><th>Critère d'évaluation</th><th>Statut de conformité</th></tr></thead>
                        <tbody id="auditTableBody"></tbody>
                    </table>
                </div>
                <button class="btn-primary" style="margin-top: 40px; max-width: 300px; float: right;" onclick="validateAndSave()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Sauvegarder l'Audit
                </button>
                <div style="clear: both;"></div>
            </div>
        </div>

        <!-- History Page -->
        <div id="historyPage" class="page-section">
            <div class="glass-panel">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap:wrap; gap:15px;">
                    <div class="form-row" style="margin:0; flex:1; max-width: 600px; gap:12px;">
                        <input type="text" id="searchDate" placeholder="Rechercher une Date (YYYY-MM-DD)..." onkeyup="filterData()">
                        <input type="text" id="searchLigne" placeholder="Rechercher une Ligne..." onkeyup="filterData()">
                    </div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button onclick="exportToCSV()" class="export-btn"><i class="fa-solid fa-download"></i> Télécharger tout (CSV)</button>
                        <button onclick="clearDatabase()" style="color:var(--wkw-red); background:rgba(231,76,60,0.1); border:none; padding:12px 20px; border-radius:10px; cursor:pointer; font-weight:700; transition:0.3s;">
                            <i class="fa-solid fa-trash-can"></i> Vider l'historique
                        </button>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Date</th><th>UAP</th><th>Ligne</th><th>OK</th><th>NOK</th><th>Score</th><th>Résultat</th></tr></thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Graphiques Page -->
        <div id="chartPage" class="page-section">
            <div class="glass-panel">
                <h2 style="text-align:center; margin-bottom:30px; font-weight:800; color:var(--wkw-dark);">📊 Tableau de Bord - Graphiques & Résultats</h2>
                <div id="globalStats" class="global-stats"></div>
                <div id="chartsContent" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap:30px;"></div>
            </div>
        </div>
    </div>

<script>
    const criteria = [
        "Qualification de la Main d'œuvre",
        "État des Rebuts (Matière)",
        "Conformité du Dossier de Fabrication",
        "Respect des Normes HSE",
        "Validation du Démarrage",
        "Conformité des Formulaires Qualité",
        "Organisation & Propreté (5S)",
        "Maintenance Préventive (Niveau 1)",
        "Suivi Maintenance (Niveau 2)",
        "Validation POKA YOKE"
    ];

    const firebaseConfig = {
        apiKey: "AIzaSyBCnvkriTgPdaE37DRkRHPcULCVAYfbUHE",
        authDomain: "portail-d-audit.firebaseapp.com",
        databaseURL: "https://portail-d-audit-default-rtdb.firebaseio.com",
        projectId: "portail-d-audit",
        storageBucket: "portail-d-audit.firebasestorage.app",
        messagingSenderId: "581725098490",
        appId: "1:581725098490:web:70cd5d573787eb7530d443",
        measurementId: "G-KCCRY45MNX"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const auditsRef = firebase.database().ref('audits');

    let db = [];
    let chartUAP, chartEvolution, chartPassRate, chartLigneOKNOK;

    // ────────────────────────────────────────────────
    //  Auth state listener
    // ────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
        const overlay = document.getElementById('loginOverlay');
        if (user) {
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
            initSystem();
            showToast(`Connecté • ${user.email}`, false);
        } else {
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.opacity = '1'; }, 10);
        }
    });

    function showToast(message, isError = false) {
        const t = document.getElementById('toast');
        const i = t.querySelector('i');
        document.getElementById('toastMsg').innerText = message;
        t.style.borderLeftColor = isError ? "var(--warning)" : "var(--success)";
        i.className = isError ? "fa-solid fa-triangle-exclamation" : "fa-solid fa-circle-check";
        i.style.color = isError ? "var(--warning)" : "var(--success)";
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3200);
    }

    function handleLogin() {
        const email = document.getElementById('user').value.trim();
        const password = document.getElementById('pass').value;

        if (!email || !password) {
            return showToast("Email et mot de passe requis", true);
        }

        auth.signInWithEmailAndPassword(email, password)
            .catch(error => {
                let msg = "Erreur d'authentification";
                switch(error.code) {
                    case 'auth/invalid-email':      msg = "Format d'email invalide"; break;
                    case 'auth/user-not-found':     msg = "Compte non trouvé"; break;
                    case 'auth/wrong-password':     msg = "Mot de passe incorrect"; break;
                    case 'auth/too-many-requests':  msg = "Trop de tentatives – réessayez plus tard"; break;
                    default: msg = error.message;
                }
                showToast(msg, true);
            });
    }

    function resetPassword() {
        const email = document.getElementById('user').value.trim();
        if (!email) return showToast("Entrez votre email d'abord", true);

        auth.sendPasswordResetEmail(email)
            .then(() => showToast("Lien de réinitialisation envoyé ! Vérifiez votre boîte mail."))
            .catch(err => showToast("Erreur : " + err.message, true));
    }

    function logout() {
        auth.signOut()
            .then(() => showToast("Déconnexion réussie"))
            .catch(() => showToast("Erreur lors de la déconnexion", true));
    }

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const mw = document.getElementById('mainWrapper');
        if (window.innerWidth > 992) {
            sb.classList.toggle('collapsed');
            mw.classList.toggle('expanded');
        } else {
            sb.classList.toggle('mobile-show');
        }
    }

    function initSystem() {
        document.getElementById('auditDate').valueAsDate = new Date();

        const tbody = document.getElementById('auditTableBody');
        tbody.innerHTML = criteria.map((q, i) => {
            const id = i + 1;
            return `<tr>
                <td>${id < 10 ? '0'+id : id}</td>
                <td>${q}</td>
                <td>
                    <div class="custom-radio-group">
                        <div class="radio-btn"><input type="radio" id="ok${id}" name="q${id}" value="1" onchange="calcScore()"><label for="ok${id}" class="ok-label"><i class="fa-solid fa-check"></i> OK</label></div>
                        <div class="radio-btn"><input type="radio" id="nok${id}" name="q${id}" value="0" onchange="calcScore()"><label for="nok${id}" class="nok-label"><i class="fa-solid fa-xmark"></i> NOK</label></div>
                        ${id === 10 ? `<div class="radio-btn"><input type="radio" id="na${id}" name="q${id}" value="na" onchange="calcScore()"><label for="na${id}" class="na-label">N/A</label></div>` : ''}
                    </div>
                </td>
            </tr>`;
        }).join('');

        auditsRef.on('value', (snapshot) => {
            db = snapshot.val() ? Object.values(snapshot.val()) : [];
            loadHistory();
            if (document.getElementById('chartPage').classList.contains('active')) renderCharts();
        });
    }

    function calcScore() {
        let ok = 0, nok = 0, na = 0;
        for(let i=1; i<=10; i++) {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if(sel) {
                if(sel.value === "1") ok++;
                else if(sel.value === "0") nok++;
                else if(sel.value === "na") na++;
            }
        }
        document.getElementById('count-ok').innerText = ok;
        document.getElementById('count-nok').innerText = nok;
        const divisor = (na > 0) ? 9 : 10;
        const score = ok / divisor * 100;
        document.getElementById('count-score').innerText = score.toFixed(1) + "%";
    }

    function switchPage(pageId) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('pageTitle').innerText =
            pageId === 'auditPage' ? 'Audit en Temps Réel' :
            pageId === 'historyPage' ? 'Base de Données Historique' :
            'Graphiques & Statistiques';

        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const idx = pageId === 'auditPage' ? 0 : pageId === 'historyPage' ? 1 : 2;
        document.querySelectorAll('.nav-item')[idx].classList.add('active');

        document.getElementById('sidebar').classList.remove('mobile-show');

        if (pageId === 'chartPage') renderCharts();
    }

    function renderCharts() {
        const container = document.getElementById('chartsContent');
        const statsDiv = document.getElementById('globalStats');
        container.innerHTML = '';

        if (db.length === 0) {
            statsDiv.innerHTML = '';
            container.innerHTML = `<div class="no-data"><i class="fa-solid fa-chart-bar" style="font-size:4rem;opacity:0.2;margin-bottom:20px;display:block;"></i>Aucun audit enregistré pour le moment.<br>Créez votre premier audit !</div>`;
            return;
        }

        const totalOK = db.reduce((sum, a) => sum + parseInt(a.ok || 0), 0);
        const totalNOK = db.reduce((sum, a) => sum + parseInt(a.nok || 0), 0);

        statsDiv.innerHTML = `
            <div class="stat-card ok-card"><div class="stat-icon"><i class="fa-solid fa-check"></i></div><div><h3>Total Points OK</h3><div class="value" style="color:var(--success)">${totalOK}</div></div></div>
            <div class="stat-card nok-card"><div class="stat-icon"><i class="fa-solid fa-xmark"></i></div><div><h3>Total Points NOK</h3><div class="value" style="color:var(--wkw-red)">${totalNOK}</div></div></div>
            <div class="stat-card score-card"><div class="stat-icon"><i class="fa-solid fa-list-check"></i></div><div><h3>Total Audits</h3><div class="value">${db.length}</div></div></div>
        `;

        container.innerHTML = `
            <div class="chart-container"><canvas id="uapChart"></canvas></div>
            <div class="chart-container"><canvas id="evolutionChart"></canvas></div>
            <div class="chart-container"><canvas id="passChart"></canvas></div>
            <div class="chart-container"><canvas id="ligneOKNOKChart"></canvas></div>
        `;

        // Graph 1: Score moyen par UAP
        let uapScores = {};
        db.forEach(a => {
            const s = parseFloat(a.score);
            if (!uapScores[a.uap]) uapScores[a.uap] = {sum:0, count:0};
            uapScores[a.uap].sum += s;
            uapScores[a.uap].count++;
        });
        const uapLabels = Object.keys(uapScores);
        const uapData = uapLabels.map(u => (uapScores[u].sum / uapScores[u].count).toFixed(1));

        if (chartUAP) chartUAP.destroy();
        chartUAP = new Chart(document.getElementById('uapChart'), {
            type: 'bar',
            data: { labels: uapLabels, datasets: [{ label: 'Score moyen (%)', data: uapData, backgroundColor: '#c0392b' }] },
            options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
        });

        // Graph 2: Évolution temporelle
        const sorted = [...db].sort((a,b) => new Date(a.date) - new Date(b.date));
        const dates = sorted.map(a => a.date);
        const scores = sorted.map(a => parseFloat(a.score));

        if (chartEvolution) chartEvolution.destroy();
        chartEvolution = new Chart(document.getElementById('evolutionChart'), {
            type: 'line',
            data: { labels: dates, datasets: [{ label: 'Score (%)', data: scores, borderColor: '#10b981', tension: 0.4, fill: false }] },
            options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
        });

        // Graph 3: Taux de conformité (doughnut)
        const passCount = db.filter(a => parseFloat(a.score) >= 80).length;
        const failCount = db.length - passCount;

        if (chartPassRate) chartPassRate.destroy();
        chartPassRate = new Chart(document.getElementById('passChart'), {
            type: 'doughnut',
            data: {
                labels: ['Conforme (≥80%)', 'Action Requise'],
                datasets: [{ data: [passCount, failCount], backgroundColor: ['#10b981', '#c0392b'] }]
            },
            options: { responsive: true, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });

        // Graph 4: OK vs NOK par ligne
        let ligneData = {};
        db.forEach(a => {
            if (!ligneData[a.ligne]) ligneData[a.ligne] = {ok:0, nok:0};
            ligneData[a.ligne].ok += parseInt(a.ok || 0);
            ligneData[a.ligne].nok += parseInt(a.nok || 0);
        });
        const ligneLabels = Object.keys(ligneData);
        const okValues = ligneLabels.map(l => ligneData[l].ok);
        const nokValues = ligneLabels.map(l => ligneData[l].nok);

        if (chartLigneOKNOK) chartLigneOKNOK.destroy();
        chartLigneOKNOK = new Chart(document.getElementById('ligneOKNOKChart'), {
            type: 'bar',
            data: {
                labels: ligneLabels,
                datasets: [
                    { label: 'OK', data: okValues, backgroundColor: '#10b981' },
                    { label: 'NOK', data: nokValues, backgroundColor: '#c0392b' }
                ]
            },
            options: { responsive: true, plugins: { title: { display: true, text: 'OK vs NOK par Ligne' } } }
        });
    }

    function validateAndSave() {
        const ligne = document.getElementById('ligneInput').value.trim();
        const selected = document.querySelectorAll('input[type="radio"]:checked').length;

        if (selected < 10 || !ligne) {
            return showToast("Veuillez compléter tous les critères et indiquer la ligne", true);
        }

        const scoreStr = document.getElementById('count-score').innerText;
        const scoreNum = parseFloat(scoreStr);

        const newAudit = {
            date: document.getElementById('auditDate').value,
            uap: document.getElementById('uapSelect').value,
            ligne: ligne,
            ok: document.getElementById('count-ok').innerText,
            nok: document.getElementById('count-nok').innerText,
            score: scoreStr,
            isPass: scoreNum >= 80,
            createdAt: firebase.database.ServerValue.TIMESTAMP
        };

        auditsRef.push(newAudit)
            .then(() => {
                showToast("Audit enregistré avec succès !");
                switchPage('historyPage');
            })
            .catch(err => showToast("Erreur lors de l'enregistrement : " + err.message, true));
    }

    function loadHistory() {
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = db.slice().reverse().map(r => `
            <tr>
                <td>${r.date || '—'}</td>
                <td>${r.uap || '—'}</td>
                <td><b>${r.ligne || '—'}</b></td>
                <td>${r.ok || 0}</td>
                <td>${r.nok || 0}</td>
                <td style="font-weight:800; color:${r.isPass ? 'var(--success)' : 'var(--wkw-red)'}">${r.score || '—'}</td>
                <td>
                    <span style="background:${r.isPass?'rgba(16,185,129,0.1)':'rgba(231,76,60,0.1)'}; color:${r.isPass?'var(--success)':'var(--wkw-red)'}; padding:6px 14px; border-radius:20px; font-size:12.5px; font-weight:700;">
                        ${r.isPass ? 'Conforme' : 'Action Requise'}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    function filterData() {
        const fDate = document.getElementById('searchDate').value.toLowerCase().trim();
        const fLigne = document.getElementById('searchLigne').value.toLowerCase().trim();

        document.querySelectorAll('#historyTableBody tr').forEach(row => {
            const dateCell = row.cells[0].innerText.toLowerCase();
            const ligneCell = row.cells[2].innerText.toLowerCase();
            row.style.display = (dateCell.includes(fDate) && ligneCell.includes(fLigne)) ? "" : "none";
        });
    }

    function exportToCSV() {
        if (db.length === 0) return showToast("Aucun audit à exporter", true);

        const headers = ["Date","UAP","Ligne","OK","NOK","Score","Résultat"];
        const rows = db.slice().reverse().map(r => [
            r.date || '',
            r.uap || '',
            r.ligne || '',
            r.ok || 0,
            r.nok || 0,
            r.score || '',
            r.isPass ? "Conforme" : "Action Requise"
        ].map(v => `"${v}"`).join(';'));

        const csv = [headers.join(';'), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `WKW_Audits_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(url);

        showToast("Export CSV téléchargé");
    }

    function clearDatabase() {
        if (!confirm("Êtes-vous sûr de vouloir SUPPRIMER TOUS les audits ?\nCette action est irréversible.")) return;

        auditsRef.remove()
            .then(() => showToast("Base de données vidée avec succès"))
            .catch(err => showToast("Erreur : " + err.message, true));
    }

    // Enter key support
    document.getElementById('pass').addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
